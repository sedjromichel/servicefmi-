<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SERVICE FMI</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px;
    }

    button {
      width: 95%;
      padding: 10px;
      margin: 5px;
      background: teal;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box" id="loginBox">
  <h2>Connexion</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>
  <button onclick="register()">Créer un compte</button>
</div>

<div class="box" id="appBox" style="display:none;">
  <h2>Dashboard</h2>
  <p>Solde : <span id="solde">0</span> €</p>

  <input type="number" id="montant" placeholder="Ajouter montant">
  <button onclick="ajouterSolde()">Ajouter</button>

  <button onclick="logout()">Déconnexion</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBIfjF0ERcEZjr54rlf8dafGuTMPZuR34U",
  authDomain: "service-fmi.firebaseapp.com",
  databaseURL: "https://service-fmi-default-rtdb.firebaseio.com",
  projectId: "service-fmi",
  storageBucket: "service-fmi.firebasestorage.app",
  messagingSenderId: "295191253945",
  appId: "1:295191253945:web:c670229a7652a5a0461c68"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(user => {
      alert("Compte créé !");
      db.ref("users/" + user.user.uid).set({
        solde: 0
      });
    })
    .catch(err => alert(err.message));
}

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .catch(err => alert(err.message));
}

function logout() {
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("appBox").style.display = "block";

    db.ref("users/" + user.uid).on("value", snap => {
      document.getElementById("solde").innerText = snap.val().solde;
    });

  } else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("appBox").style.display = "none";
  }
});

function ajouterSolde() {
  const montant = parseInt(document.getElementById("montant").value);
  const user = auth.currentUser;

  if (!user) return;

  const ref = db.ref("users/" + user.uid);

  ref.once("value").then(snap => {
    let actuel = snap.val().solde;
    ref.update({
      solde: actuel + montant
    });
  });
}
</script>
<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBIfjF0ERcEZjr54rlf8dafGuTMPZuR34U",
  authDomain: "service-fmi.firebaseapp.com",
  projectId: "service-fmi",
  storageBucket: "service-fmi.firebasestorage.app",
  messagingSenderId: "295191253945",
  appId: "1:295191253945:web:c670229a7652a5a0461c68"
};

// INIT
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// NAVIGATION
function showPage(page){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

// REGISTER
function register(){
  let email = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  auth.createUserWithEmailAndPassword(email, pass)
    .then(() => alert("Compte créé ✅"))
    .catch(err => alert(err.message));
}

// LOGIN
function login(){
  let email = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  auth.signInWithEmailAndPassword(email, pass)
    .catch(err => alert(err.message));
}

// AUTO LOGIN
auth.onAuthStateChanged(user => {
  if(user){
    showPage('dashboard');
    loadAccounts();
  } else {
    showPage('login');
  }
});

// AJOUT COMPTE
function addAccount(){
  let user = auth.currentUser;
  if(!user) return;

  let name = prompt("Nom du compte");
  let solde = prompt("Solde");

  db.collection("accounts").add({
    uid: user.uid,
    name: name,
    solde: Number(solde)
  }).then(() => loadAccounts());
}

// LOAD
function loadAccounts(){
  let user = auth.currentUser;
  let container = document.getElementById("accounts");
  container.innerHTML = "";

  db.collection("accounts")
    .where("uid", "==", user.uid)
    .get()
    .then(snapshot => {
      snapshot.forEach(doc => {
        let data = doc.data();

        container.innerHTML += `
          <div class="banque">
            <span>${data.name}</span>
            <span>${data.solde} €</span>
          </div>
        `;
      });
    });
}
</script>
</body>
</html>
