<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SERVICE FMI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* HEADER */
.header {
  background: white;
  padding: 15px;
  font-weight: bold;
}

/* HERO */
.hero {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
  url("https://images.unsplash.com/photo-1521791136064-7986c2920216");
  background-size: cover;
  color: white;
  padding: 30px;
}

/* TITRE */
.hero h1 {
  font-size: 30px;
  max-width: 300px;
}

/* CARD LOGIN */
.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 10px;
  margin-top: 30px;
  width: 300px;
}

/* INPUT */
input {
  width: 95%;
  padding: 10px;
  margin: 10px 0;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  background: crimson;
  color: white;
  border: none;
  border-radius: 20px;
}
</style>
</head>

<body>

<div class="header">SERVICE FMI</div>

<div class="hero">

<h1>UNE PLATEFORME RAPIDE, SÛRE & SIMPLE</h1>

<div class="card">
  <h3>Accédez à votre compte</h3>

  <input type="email" placeholder="Email">
  <input type="password" placeholder="Mot de passe">

  <button>SE CONNECTER</button>
</div>

</div>

</body>
</html>
