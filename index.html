<script>
const firebaseConfig = {
  apiKey: "AIzaSyBIfjF0ERcEZjr54rlf8dafGuTMPZuR34U",
  authDomain: "service-fmi.firebaseapp.com",
  databaseURL: "https://service-fmi-default-rtdb.firebaseio.com",
  projectId: "service-fmi",
  storageBucket: "service-fmi.firebasestorage.app",
  messagingSenderId: "295191253945",
  appId: "1:295191253945:web:c670229a7652a5a0461c68"
};

// INIT
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
function login(){
  let email = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  auth.signInWithEmailAndPassword(email, pass)
    .then(() => {
      alert("Connexion réussie ✅");
      showPage('dashboard');
      loadAccounts();
    })
    .catch(err => alert(err.message));
}

// REGISTER
function register(){
  let email = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  auth.createUserWithEmailAndPassword(email, pass)
    .then(() => alert("Compte créé ✅"))
    .catch(err => alert(err.message));
}

// AJOUT COMPTE
function addAccount(){
  let name = prompt("Nom de la banque");
  let solde = prompt("Solde");

  db.collection("accounts").add({
    name: name,
    solde: solde
  }).then(() => {
    loadAccounts();
  });
}

// CHARGER COMPTES
function loadAccounts(){
  let container = document.getElementById("accounts");
  container.innerHTML = "";

  db.collection("accounts").get().then(snapshot => {
    snapshot.forEach(doc => {
      let data = doc.data();

      container.innerHTML += `
        <div class="banque">
          <span>${data.name}</span>
          <span>${data.solde} €</span>
        </div>
      `;
    });
  });
}
</script>
