<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SERVICE FMI</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* PAGES */
.page {
  display: none;
}
.active {
  display: block;
}

/* BOX */
.box {
  background: white;
  padding: 20px;
  border-radius: 15px;
  width: 320px;
  text-align: center;
}

/* INPUT */
input {
  width: 90%;
  padding: 10px;
  margin: 5px;
}

/* BUTTON */
button {
  width: 95%;
  padding: 10px;
  margin: 5px;
  background: teal;
  color: white;
  border: none;
}

/* BANKS */
.bank {
  padding: 10px;
  margin: 10px;
  background: #eee;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- PAGE LOGIN -->
<div class="box page active" id="login">
  <h2>Connexion</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>
  <button onclick="register()">Créer compte</button>
</div>

<!-- PAGE BANQUES -->
<div class="box page" id="banques">
  <h2>Choisir une banque</h2>

  <div class="bank" onclick="selectBank('SG')">🏦 Société Générale NC</div>
  <div class="bank" onclick="selectBank('BCI')">🏦 BCI</div>
  <div class="bank" onclick="selectBank('BNC')">🏦 BNC</div>

</div>

<!-- PAGE FAKE LOGIN BANQUE -->
<div class="box page" id="fake">
  <h2 id="bankName">Banque</h2>

  <input type="text" placeholder="Identifiant">
  <input type="password" placeholder="Mot de passe">

  <button onclick="goDashboard()">Valider</button>
</div>

<!-- DASHBOARD -->
<div class="box page" id="dashboard">
  <h2>Dashboard</h2>
  <p>Solde : <span id="solde">0</span> €</p>

  <input type="number" id="montant" placeholder="Montant">

  <button onclick="ajouterSolde()">Ajouter</button>
  <button onclick="retirerSolde()">Retirer</button>

  <button onclick="logout()">Déconnexion</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBIfjF0ERcEZjr54rlf8dafGuTMPZuR34U",
  authDomain: "service-fmi.firebaseapp.com",
  databaseURL: "https://service-fmi-default-rtdb.firebaseio.com",
  projectId: "service-fmi",
  storageBucket: "service-fmi.firebasestorage.app",
  messagingSenderId: "295191253945",
  appId: "1:295191253945:web:c670229a7652a5a0461c68"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* NAVIGATION */
function showPage(id){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* AUTH */
function register(){
  const email = emailInput();
  const password = passwordInput();

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => alert("Compte créé"))
    .catch(e => alert(e.message));
}

function login(){
  const email = emailInput();
  const password = passwordInput();

  auth.signInWithEmailAndPassword(email, password)
    .catch(e => alert(e.message));
}

function logout(){
  auth.signOut();
}

/* INPUT */
function emailInput(){
  return document.getElementById("email").value;
}
function passwordInput(){
  return document.getElementById("password").value;
}

/* STATE */
auth.onAuthStateChanged(user=>{
  if(user){
    showPage("banques");
  }else{
    showPage("login");
  }
});

/* BANQUE */
function selectBank(name){
  document.getElementById("bankName").innerText = name;
  showPage("fake");
}

function goDashboard(){
  showPage("dashboard");

  const user = auth.currentUser;
  db.ref("users/" + user.uid).on("value", snap=>{
    if(snap.exists()){
      document.getElementById("solde").innerText = snap.val().solde;
    }
  });
}

/* ARGENT */
function ajouterSolde(){
  const montant = parseInt(document.getElementById("montant").value);
  const user = auth.currentUser;

  if(!user || isNaN(montant)) return;

  const ref = db.ref("users/" + user.uid);

  ref.once("value").then(snap=>{
    let actuel = snap.val().solde || 0;
    ref.update({ solde: actuel + montant });
  });
}

function retirerSolde(){
  const montant = parseInt(document.getElementById("montant").value);
  const user = auth.currentUser;

  if(!user || isNaN(montant)) return;

  const ref = db.ref("users/" + user.uid);

  ref.once("value").then(snap=>{
    let actuel = snap.val().solde || 0;

    if(actuel >= montant){
      ref.update({ solde: actuel - montant });
    }else{
      alert("Solde insuffisant");
    }
  });
}
</script>

</body>
</html>
