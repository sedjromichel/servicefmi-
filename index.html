<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Service FMI</title>
<style>
body { font-family: Arial; background:#f2f2f2; margin:0; padding:0; }
.nav { background:green; color:white; padding:15px; text-align:center; font-weight:bold; }
.nav span { margin:0 10px; cursor:pointer; }
.page { display:none; padding:20px; }
.active { display:block; }
.login-box { background:white; padding:20px; width:300px; margin:80px auto; border-radius:10px; }
input { width:90%; padding:10px; margin:10px 0; }
button { background:green; color:white; border:none; padding:10px; width:100%; cursor:pointer; border-radius:5px; }
.banque { background:white; padding:15px; margin:10px auto; border-radius:10px; display:flex; align-items:center; max-width:500px; box-shadow:0 0 5px rgba(0,0,0,0.1); justify-content:space-between; }
.banque img { width:50px; margin-right:15px; }
.banque span { font-weight:bold; color:#333; }
h2 { text-align:center; color:green; }
</style>
</head>
<body>

<div class="nav">
  <span onclick="showPage('login')">Connexion</span>
</div>

<!-- LOGIN -->
<div id="login" class="page active">
  <div class="login-box">
    <h2>Connexion 🔐</h2>
    <input id="user" placeholder="Identifiant">
    <input id="pass" type="password" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
  <h2>💳 SERVICE FMI – Mes Banques</h2>

  <div class="banque">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/4a/BCI_Logo.png" alt="BCI"/>
    <span>BCI Nouvelle-Calédonie</span>
    <span>Solde : 1 000 000 €</span>
  </div>

  <div class="banque">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2c/BNC_New_Caledonia_logo.png" alt="BNC"/>
    <span>BNC Nouvelle-Calédonie</span>
    <span>Solde : 1 000 000 €</span>
  </div>

  <div class="banque">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Societe_Generale_logo.svg" alt="Société Générale"/>
    <span>Société Générale NC</span>
    <span>Solde : 1 000 000 €</span>
  </div>

  <div class="banque">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/37/Bebunk_logo.png" alt="Bebunk"/>
    <span>Bebunk NC</span>
    <span>Solde : 1 000 000 €</span>
  </div>

  <div class="banque">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/BNP_Paribas_logo.svg" alt="BNP Paribas"/>
    <span>BNP Paribas NC</span>
    <span>Solde : 1 000 000 €</span>
  </div>

  <div class="banque">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/OPT_New_Caledonia_logo.png" alt="OPT"/>
    <span>OPT NC</span>
    <span>Solde : 1 000 000 €</span>
  </div>
</div>

<script>
function showPage(page){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

// Login simple
function login(){
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;
  if(user==="admin" && pass==="1234"){
    showPage('dashboard');
  } else{
    alert("Erreur ❌ Identifiant ou mot de passe incorrect");
  }
}
</script>

</body>
</html>
