.login-box {
  background:white;
  padding:20px;

button {
  width:100%;
  padding:12px;
  background:#0f766e;

}

/* DASHBOARD */

.active { display:block; }

.banque {

  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

    <button onclick="login()">Se connecter</button>
