<title>SERVICE FMI</title>

<style>
body {
    font-family: Arial, sans-serif;
    background:#f2f4f7;
    margin:0;
}

/* HEADER */
.header {
    background: linear-gradient(90deg, #0f766e, #134e4a);
    color:white;
    text-align:center;
    padding:15px;
}

.header img {
    width:50px;
    display:block;
    margin:0 auto 5px;
}

.header h1 {

    font-size:20px;
}

.header span {
    font-size:13px;
    color:#a7f3d0;
}

/* NAV */
.nav {
    background:#065f46;
    color:white;
    text-align:center;
    padding:10px;
}

.nav span {
    cursor:pointer;
}

/* PAGES */
.page { display:none; padding:20px; }
.active { display:block; }

/* LOGIN */
.login-box {
    background:white;
    padding:20px;
    max-width:350px;
    margin:60px auto;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
}

button {
    width:100%;
    padding:12px;
    background:#0f766e;
    color:white;
    border:none;
    border-radius:10px;
    font-size:15px;
    cursor:pointer;
}

button:hover {
    background:#0b5f58;
}

/* DASHBOARD */
h2 {
    text-align:center;
    color:#065f46;
}

.banque {
    background:white;
    padding:15px;
    margin:10px auto;
    border-radius:12px;
    display:flex;
    align-items:center;
    max-width:500px;
    justify-content:space-between;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.banque-left {
    display:flex;
    align-items:center;
}

.banque img {
    width:45px;
    margin-right:10px;
}

.secure {
    text-align:center;
    color:green;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header">

  <h1>SERVICE FMI</h1>
  <span>Espace sécurisé de gestion</span>
</div>

<!-- NAV -->
<div class="nav">
  <span onclick="showPage('login')">Connexion</span>
</div>

<!-- LOGIN -->
<div id="login" class="page active">
  <div class="login-box">
    <h2>🔐 Connexion sécurisée</h2>

    <input id="user" placeholder="Identifiant">
    <input id="pass" type="password" placeholder="Mot de passe">

    <button onclick="login()">Se connecter</button>

    <div class="secure">🔒 Connexion sécurisée SSL</div>
  </div>
</div>
