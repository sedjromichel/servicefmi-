<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SERVICE FMI</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px;
    }

    button {
      width: 95%;
      padding: 10px;
      margin: 5px;
      background: teal;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box" id="loginBox">
  <h2>Connexion</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>
  <button onclick="register()">Créer un compte</button>
</div>

<div class="box" id="appBox" style="display:none;">
  <h2>Dashboard</h2>
  <p>Solde : <span id="solde">0</span> €</p>

  <input type="number" id="montant" placeholder="Ajouter montant">
  <button onclick="ajouterSolde()">Ajouter</button>

  <button onclick="logout()">Déconnexion</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBIfjF0ERcEZjr54rlf8dafGuTMPZuR34U",
  authDomain: "service-fmi.firebaseapp.com",
  databaseURL: "https://service-fmi-default-rtdb.firebaseio.com",
  projectId: "service-fmi",
  storageBucket: "service-fmi.firebasestorage.app",
  messagingSenderId: "295191253945",
  appId: "1:295191253945:web:c670229a7652a5a0461c68"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(user => {
      alert("Compte créé !");
      db.ref("users/" + user.user.uid).set({
        solde: 0
      });
    })
    .catch(err => alert(err.message));
}

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .catch(err => alert(err.message));
}

function logout() {
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("appBox").style.display = "block";

    db.ref("users/" + user.uid).on("value", snap => {
      document.getElementById("solde").innerText = snap.val().solde;
    });

  } else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("appBox").style.display = "none";
  }
});

function ajouterSolde() {
  const montant = parseInt(document.getElementById("montant").value);
  const user = auth.currentUser;

  if (!user) return;

  const ref = db.ref("users/" + user.uid);

  ref.once("value").then(snap => {
    let actuel = snap.val().solde;
    ref.update({
      solde: actuel + montant
    });
  });
}
</script>

</body>
</html>
